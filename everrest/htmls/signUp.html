<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Everrest — Create Account</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@300;400;500;600&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/signUp.css" />
  </head>
  <body>
    <!-- VISUAL PANEL -->
    <aside class="panel-visual">
      <div class="panel-grid"></div>
      <div class="panel-lines"></div>
      <div class="panel-sigil">
        <div class="p-ring"></div>
        <div class="p-ring"></div>
        <div class="p-ring"></div>
        <div class="p-core">⬡</div>
      </div>
      <div class="panel-top">
        <a href="../index.html" class="panel-wordmark">EVER<span>REST</span></a>
      </div>
      <div class="panel-bottom">
        <div class="panel-tagline">
          <p class="eyebrow">new soul detected</p>
          <h2>Begin your<br /><span>ascent.</span></h2>
        </div>
        <p class="panel-signin">
          Already forged an account? <a href="signin.html">Sign In →</a>
        </p>
      </div>
    </aside>

    <!-- FORM PANEL -->
    <main class="panel-form">
      <div class="form-header">
        <p class="form-eyebrow">create_account</p>
        <h1>Join the <span>Archive</span></h1>
      </div>

      <form id="form">
        <div class="form-grid">
          <div class="field">
            <label for="firstName">First Name</label>
            <input
              type="text"
              id="firstName"
              name="firstName"
              placeholder="arthur"
              autocomplete="given-name"
              required
            />
          </div>

          <div class="field">
            <label for="lastName">Last Name</label>
            <input
              type="text"
              id="lastName"
              name="lastName"
              placeholder="Morningstar"
              autocomplete="family-name"
              required
            />
          </div>

          <div class="field">
            <label for="age">Age</label>
            <input
              type="number"
              id="age"
              name="age"
              placeholder="21"
              min="1"
              max="120"
              required
            />
          </div>

          <div class="field">
            <label for="phone">Phone</label>
            <input
              type="tel"
              id="phone"
              name="phone"
              placeholder="+1 555 000 0000"
              autocomplete="tel"
              required
            />
          </div>

          <div class="field full">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="hero@everrest.dev"
              autocomplete="email"
              required
            />
          </div>

          <div class="field full">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Min. 8 characters"
              required
            />
          </div>

          <div class="section-divider"><span>// location data</span></div>

          <div class="field full">
            <label for="address">Address</label>
            <input
              type="text"
              id="address"
              name="address"
              placeholder="123 Ember Lane, Void City"
              autocomplete="street-address"
              required
            />
          </div>

          <div class="field">
            <label for="zipcode">Zip Code</label>
            <input
              type="text"
              id="zipcode"
              name="zipcode"
              placeholder="00000"
              autocomplete="postal-code"
              required
            />
          </div>

          <div class="field">
            <label for="avatar">Avatar URL</label>
            <input
              type="url"
              id="avatar"
              name="avatar"
              placeholder="https://…"
            />
          </div>

          <div class="field full">
            <label>Gender</label>
            <div class="gender-group">
              <input
                type="radio"
                class="gender-option"
                name="gender"
                id="gMale"
                value="MALE"
              />
              <label class="gender-label" for="gMale">Male</label>

              <input
                type="radio"
                class="gender-option"
                name="gender"
                id="gFemale"
                value="FEMALE"
              />
              <label class="gender-label" for="gFemale">Female</label>

              <input
                type="radio"
                class="gender-option"
                name="gender"
                id="gUnspec"
                value="UNSPECIFIED"
              />
              <label class="gender-label" for="gUnspec"
                >Prefer Not to Say</label
              >
            </div>
          </div>
        </div>

        <div class="submit-row">
          <button type="submit" class="btn-submit">Forge Account</button>
          <p class="form-note">
            By signing up you agree to our<br />
            <a href="#">Terms</a> &amp; <a href="#">Privacy Policy</a>
          </p>
        </div>
      </form>
    </main>
    <script src="../jss/singUp.js"></script>
  </body>
</html>
