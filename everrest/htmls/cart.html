<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../css/shop.css" />
    <link rel="stylesheet" href="../css/shop-description.css">
  </head>
  <body>
    <nav id="navbar">
      <div class="left">
        <div id="logo"><a href="./shop.html">MyShop</a></div>
      </div>
      <div class="right">
        <a href="./cart.html" id="cart"
          ><i class="fa-solid fa-cart-shopping"></i
        ></a>
        <a href="../index.html"> Home </a>
      </div>
    </nav>
    <div id="layout">
      <aside id="sidebar">
        <button id="clear-filters">✕ Remove all filters</button>
      </aside>
      <main id="main">
        <section>
          <div id="product-page">
            <div id="gallery">
              <img id="main-image" src="" alt="" />
              <div id="thumbnails"></div>
            </div>

            <div id="info">
              <p id="brand"></p>
              <p id="category"></p>
              <h1 id="title"></h1>
              <p id="description"></p>

              <div id="price">
                <span id="current-price"></span>
                <span id="before-discount"></span>
                <span id="discount-badge"></span>
              </div>

              <div id="rating">
                <span id="rating-value"></span>
                <span id="rating-count"></span>
              </div>

              <div id="stock"></div>
              <div id="warranty"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="../jss/cart.js"></script>
  </body>
</html>
