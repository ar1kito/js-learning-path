  <body>
    <header>
      <nav class="nav-left">
        <a href="../index.html" class="nav-btn signup" id="sup"> menu </a>

    <div class="change-pass hide" id="PassChnDiv">
      <div class="PassHead">
        <h3>Change <span>your password</span></h3>
      </div>
      <div class="wrapper">
        <form action="" id="form">
          <label for="OldPass">old password</label>
          <input
            type="text"
            id="OldPass"
            placeholder="- enter your current password"
            required
          />
          <p class="HidePass">password is wrong</p>
          <label for="NewPass"> new password</label>
          <input
            type="text"
            id="NewPass"
            placeholder="- enter your new password"
            required
          />
          <button type="submit" class="btn-submit">Submit</button>
        </form>
      </div>
    </div>
    <script src="../jss/ChangePass.js"></script>
  </body>
