<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Shop</title>
    <link rel="stylesheet" href="../css/shop.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <nav id="navbar">
      <div class="left">
        <div id="logo"><a href="./shop.html">MyShop</a></div>
        <input type="text" id="search-input" placeholder="Search products..." />
      </div>
      <div class="right">
        <a href="#"><i class="fa-solid fa-cart-shopping"></i></a>
        <a href="../index.html"> Home </a>
      </div>
    </nav>

    <div id="layout">
      <aside id="sidebar">
        <div class="filter-group">
          <h3>Category</h3>
          <div id="category-filters" class="hide"></div>
        </div>

        <div class="filter-group">
          <h3>Brand</h3>
          <div id="brand-filters" class="hide"></div>
        </div>

        <div class="filter-group">
          <h3>Price</h3>
          <div id="sort-buttons">
            <button class="sort-btn" id="sort-asc">Price ↑</button>
            <button class="sort-btn" id="sort-desc">Price ↓</button>
          </div>
        </div>

        <button id="clear-filters">✕ Remove all filters</button>
      </aside>

      <main id="main">
        <div id="div1"></div>
        <div id="div2"></div>
      </main>
    </div>

    <script src="../jss/shop.js"></script>
  </body>
</html>
